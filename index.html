<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBS TV - FULL MODE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            width: 100vw; height: 100vh;
            background: #000;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #app {
            width: 100vh; 
            height: 100vw; 
            display: flex; 
            flex-direction: column; 
            transform: rotate(90deg);
            background: #000;
            padding: 5px 0;
        }

        /* 1. CABEÇALHO (10%) */
        #header-jornal {
            height: 10%; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 2px solid #d32f2f; z-index: 10;
        }
        #header-jornal img { height: 50%; }
        #header-jornal h2 { color: #fff; font-family: 'Arial Black', sans-serif; font-size: 1.3rem; text-transform: uppercase; }

        /* 2. NOTÍCIA (25%) */
        #container-destaque { height: 25%; width: 100%; padding: 5px 10px; z-index: 10; }
        .destaque-split { width: 100%; height: 100%; display: flex; border: 2px solid #d32f2f; border-radius: 12px; overflow: hidden; background: #050505; }
        .col-esquerda { width: 55%; height: 100%; padding: 10px; display: flex; flex-direction: column; }
        .scroll-wrapper { flex-grow: 1; overflow: hidden; position: relative; margin-top: 2px; }
        
        .corpo-texto {
            font-size: 1.15rem; line-height: 1.4; color: #ffffff; font-family: 'Segoe UI', sans-serif;
            position: absolute; width: 100%;
            animation: scrollSubindo 250s linear infinite;
            animation-delay: 9s;
            transform: translateY(0);
        }

        @keyframes scrollSubindo {
            0% { transform: translateY(0); }
            100% { transform: translateY(-120%); }
        }

        .col-direita { 
            width: 45%; height: 100%; 
            border-left: 2px solid #d32f2f; 
            background: #111; 
            display: flex; align-items: center; justify-content: center;
        }
        .img-destaque { width: 100%; height: 100%; object-fit: contain; }

        /* 3. VÍDEO ANÚNCIOS (35%) */
        #container-video-gif { height: 35%; width: 100%; padding: 5px 10px; z-index: 10; }
        .box-anuncio { width: 100%; height: 100%; border: 2px solid #d32f2f; border-radius: 12px; overflow: hidden; background: #000; }
        .video-player-gif { width: 100%; height: 100%; object-fit: contain; }

        /* 4. PLAYER AO VIVO (30%) */
        #container-live { height: 30%; width: 100%; padding: 5px 10px; z-index: 10; }
        #live-box { width: 100%; height: 100%; border: 3px solid #ffeb3b; border-radius: 12px; overflow: hidden; position: relative; background: #000; }
        #live-player { width: 100%; height: 100%; object-fit: contain; }

        .badge-live { position: absolute; top: 8px; left: 8px; background: #d32f2f; color: white; padding: 3px 8px; font-size: 0.7rem; font-family: 'Arial Black', sans-serif; border-radius: 3px; z-index: 20; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .tag { background: #d32f2f; color: white; padding: 2px 6px; font-size: 0.7rem; font-family: sans-serif; font-weight: bold; width: fit-content; margin-bottom: 3px; }
        .titulo { font-size: 1.05rem; color: #ffeb3b; font-family: 'Arial Black', sans-serif; text-transform: uppercase; margin-bottom: 2px; line-height: 1.1; }
    </style>
</head>
<body>

<div id="app">
    <header id="header-jornal">
        <img src="https://i.imgur.com/z4cbwxj.png" alt="Logo KBS TV">
        <h2>KBS TV JORNAL BOCAIUVA DO SUL</h2>
    </header>

    <div id="container-destaque"></div>

    <div id="container-video-gif">
        <div class="box-anuncio">
            <video id="video-anuncio" class="video-player-gif" loop playsinline autoplay muted>
                <source src="https://i.imgur.com/KR9qyea.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div id="container-live">
        <div id="live-box">
            <div class="badge-live">AO VIVO</div>
            <video id="live-player" playsinline autoplay></video>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // CONFIGURAÇÃO ATUALIZADA: JORNAL BOCAIUVA
    const firebaseConfig = {
        apiKey: "AIzaSyCjxNFoqm4n_zdVo7HaBHwOrUTEmoFtKck",
        authDomain: "jornal-bocaiuva.firebaseapp.com",
        databaseURL: "https://jornal-bocaiuva-default-rtdb.firebaseio.com",
        projectId: "jornal-bocaiuva",
        storageBucket: "jornal-bocaiuva.firebasestorage.app",
        messagingSenderId: "828918382499",
        appId: "1:828918382499:web:ba8a703fa8daa3c5a4e416",
        measurementId: "G-MZKSBB20WW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const videoLive = document.getElementById('live-player');
    const videoAnuncio = document.getElementById('video-anuncio');
    const liveSrc = 'https://srv3.zcast.com.br/kbstv/kbstv/playlist.m3u8';

    function goFull() {
        const el = document.documentElement;
        const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (rfs) rfs.call(el).catch(err => console.log("Erro ao forçar full screen: ", err));
    }

    function setupLivePlayer() {
        if (Hls.isSupported()) {
            const hls = new Hls({ manifestLoadingMaxRetry: 50 });
            hls.loadSource(liveSrc);
            hls.attachMedia(videoLive);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                videoLive.muted = false;
                videoLive.play().then(() => {
                    videoAnuncio.play();
                    setTimeout(goFull, 500); 
                }).catch(() => {
                    videoLive.muted = true;
                    videoLive.play().then(() => {
                        videoAnuncio.play();
                        goFull();
                    });
                });
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) setupLivePlayer();
            });
        } else if (videoLive.canPlayType('application/vnd.apple.mpegurl')) {
            videoLive.src = liveSrc;
            videoLive.oncanplay = () => {
                videoLive.play();
                videoAnuncio.play();
                goFull();
            };
        }
    }

    setupLivePlayer();

    let noticias = [];
    let atual = 0;

    signInAnonymously(auth).then(() => {
        // Apontando para a coleção raiz 'news' do novo projeto
        const ref = collection(db, 'news');
        onSnapshot(query(ref), (snap) => {
            const temp = [];
            snap.forEach(doc => temp.push(doc.data()));
            noticias = temp;
            if (noticias.length > 0) proxima();
        });
    });

    function proxima() {
        const container = document.getElementById("container-destaque");
        if (noticias.length === 0) return;
        const n = noticias[atual];
        container.innerHTML = `
            <div class="destaque-split">
                <div class="col-esquerda">
                    <div class="tag">${n.tag || 'DESTAQUE'}</div>
                    <h1 class="titulo">${n.title}</h1>
                    <div class="scroll-wrapper">
                        <div class="corpo-texto">${n.content || n.summary || '...'}<br><br><br></div>
                    </div>
                </div>
                <div class="col-direita"><img src="${n.cover || ''}" class="img-destaque"></div>
            </div>`;
        atual = (atual + 1) % noticias.length;
        setTimeout(proxima, 45000); 
    }
</script>
</body>
</html>
